name: Windows Runner RDP via Tailscale

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Install Tailscale
        shell: pwsh
        run: |
          $msiUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
          $msiPath = Join-Path $env:RUNNER_TEMP "tailscale-setup-latest-amd64.msi"
          Invoke-WebRequest -Uri $msiUrl -OutFile $msiPath
          Start-Process msiexec.exe -Wait -ArgumentList "/i", "`"$msiPath`"", "/qn", "/norestart", "TS_NOLAUNCH=1"
          Start-Sleep -Seconds 5
          Start-Service Tailscale -ErrorAction SilentlyContinue

      - name: Setup RDP User and Registry
        shell: pwsh
        run: |
          # 1. ユーザー作成 (パスワードをより長く、記号を避けて複雑にする)
          $username = "rdpadmin"
          $plainPassword = "GitHubRunner2026SecurePass" # 記号なしで長くする
          $password = ConvertTo-SecureString $plainPassword -AsPlainText -Force
          
          Write-Host "Checking if user $username exists..."
          if (Get-LocalUser -Name $username -ErrorAction SilentlyContinue) {
            Remove-LocalUser -Name $username
          }
          
          Write-Host "Creating new local user..."
          New-LocalUser -Name $username -Password $password -FullName "RDP Admin User" -Description "Tailscale RDP"
          
          Write-Host "Adding to groups..."
          Add-LocalGroupMember -Group "Administrators" -Member $username
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username

          # 2. RDP設定とNLA無効化
          Write-Host "Configuring RDP and Firewall..."
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name 'fDenyTSConnections' -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name 'UserAuthentication' -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Connect to Tailscale
        shell: pwsh
        env:
          TS_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          $tailscale = "${env:ProgramFiles}\Tailscale\tailscale.exe"
          & $tailscale up --auth-key="$env:TS_AUTHKEY" --hostname="gha-windows-rdp" --unattended --reset
          
          Write-Host "------------------------------------------"
          Write-Host "IP Address: $(& $tailscale ip -4)"
          Write-Host "Username  : rdpadmin"
          Write-Host "Password  : GitHubRunner2026SecurePass"
          Write-Host "------------------------------------------"

      - name: Keep Alive
        shell: pwsh
        run: Start-Sleep -Seconds 21600
