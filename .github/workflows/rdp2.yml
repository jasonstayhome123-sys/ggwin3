name: Windows Runner RDP via Tailscale

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Install Tailscale
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $msiUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
          $msiPath = Join-Path $env:RUNNER_TEMP "tailscale-setup-latest-amd64.msi"
          $logPath = Join-Path $env:RUNNER_TEMP "tailscale-install.log"

          Invoke-WebRequest -Uri $msiUrl -OutFile $msiPath

          $process = Start-Process msiexec.exe -Wait -PassThru -ArgumentList @(
            "/i", "`"$msiPath`"",
            "/qn",
            "/norestart",
            "/L*v", "`"$logPath`"",
            "TS_NOLAUNCH=1",
            "TS_UNATTENDEDMODE=always",
            "TS_ALLOWINCOMINGCONNECTIONS=always"
          )

          if ($process.ExitCode -ne 0) {
            Get-Content $logPath -Tail 200
            throw "Tailscale MSI install failed with exit code $($process.ExitCode)"
          }

          $service = Get-Service -Name "Tailscale" -ErrorAction SilentlyContinue
          if (-not $service) {
            Start-Sleep -Seconds 5
            $service = Get-Service -Name "Tailscale" -ErrorAction SilentlyContinue
          }

          if (-not $service) {
            throw "Tailscale service was not found after installation."
          }

          Set-Service -Name "Tailscale" -StartupType Automatic
          Start-Service -Name "Tailscale"

      - name: Create admin user for RDP
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $username = "runneradmin"
          $password = ConvertTo-SecureString "Password123!" -AsPlainText -Force

          if (-not (Get-LocalUser -Name $username -ErrorAction SilentlyContinue)) {
            New-LocalUser `
              -Name $username `
              -Password $password `
              -FullName "GitHub Actions RDP User" `
              -Description "Temporary admin user for RDP access"
          }

          Add-LocalGroupMember -Group "Administrators" -Member $username -ErrorAction SilentlyContinue

      - name: Enable RDP and firewall
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name 'fDenyTSConnections' -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name 'UserAuthentication' -Value 1
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Connect to Tailscale
        shell: pwsh
        env:
          TS_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          $ErrorActionPreference = "Stop"

          $tailscale = "${env:ProgramFiles}\Tailscale\tailscale.exe"
          if (-not (Test-Path $tailscale)) {
            throw "tailscale.exe not found at $tailscale"
          }

          & $tailscale up --auth-key="$env:TS_AUTHKEY" --hostname="gha-windows-rdp" --unattended --reset
          & $tailscale ip -4
          & $tailscale status

      - name: Keep runner alive for 6 hours
        shell: pwsh
        run: |
          Start-Sleep -Seconds 21600
