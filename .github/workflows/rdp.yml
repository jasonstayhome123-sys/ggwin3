name: Windows-Browser-Final-V2

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Download & Install DWService
      run: |
        # エージェントをダウンロード
        Invoke-WebRequest https://www.dwservice.net/download/dwagent_x86.exe -OutFile dwagent.exe
        
        # 確実にインストールを完了させるためのコマンド
        # -silent オプションを追加し、標準入力から設定を流し込みます
        Start-Process .\dwagent.exe -ArgumentList "-silent key=728-983-580" -Wait
      continue-on-error: true

    - name: Keep Alive
      run: |
        # 接続が確認できるまでログを出力し続ける
        Write-Host "Checking for connection..."
        Start-Sleep -Seconds 21600
