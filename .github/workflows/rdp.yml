name: Windows-Browser-Final-V6

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Connect DWService
      run: |
        # エージェントをダウンロード
        Invoke-WebRequest https://www.dwservice.net/download/dwagent_x86.exe -OutFile dwagent.exe
        
        # 【重要】新しいキーをここに入れ、バックグラウンドで強制実行
        # -run オプションはインストールなしで即座に接続を開始します
        Start-Process .\dwagent.exe -ArgumentList "-run key=604-355-241"
        
        Write-Host "Connecting..."
        Start-Sleep -Seconds 30

    - name: Keep Alive
      run: |
        # 接続が維持されるよう、長時間スリープ
        Start-Sleep -Seconds 21600
