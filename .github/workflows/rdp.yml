name: Windows-RDP-Final-V2

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Download & Setup Ngrok
      run: |
        # 最新版のngrokをダウンロード
        Invoke-WebRequest https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip -OutFile ngrok.zip
        Expand-Archive ngrok.zip -DestinationPath .
        
        # 解凍されたファイルをカレントディレクトリに移動（パス問題を解決）
        Get-ChildItem -Recurse -Filter "ngrok.exe" | Move-Item -Destination . -Force
        
        # 認証トークンの設定
        .\ngrok.exe authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

    - name: Create User & Enable RDP
      run: |
        net user remoteuser P@ssword1234! /add
        net localgroup administrators remoteuser /add
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

    - name: Start Ngrok & Show Address
      run: |
        # 日本リージョン(jp)を指定して起動
        Start-Process .\ngrok.exe -ArgumentList "tcp --region jp 3389"
        
        Write-Host "Waiting 20 seconds for ngrok..."
        Start-Sleep -Seconds 20
        
        try {
            $response = Invoke-RestMethod -Uri http://localhost:4040/api/tunnels
            $address = $response.tunnels[0].public_url
            Write-Host "=========================================="
            Write-Host "RDP Address: $address"
            Write-Host "User: remoteuser"
            Write-Host "Pass: P@ssword1234!"
            Write-Host "=========================================="
        } catch {
            Write-Host "Error: Could not get RDP address."
            # ngrokのプロセスが動いているか最終確認
            Get-Process ngrok -ErrorAction SilentlyContinue
        }

    - name: Keep Alive
      run: |
        Start-Sleep -Seconds 21600
