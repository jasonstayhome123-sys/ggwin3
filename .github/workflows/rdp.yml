name: Windows-RDP

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Download Ngrok
      run: |
        Invoke-WebRequest https://bin.equinox.io/c/4VmDzA7iaHb/ngrok-stable-windows-amd64.zip -OutFile ngrok.zip
        Expand-Archive ngrok.zip

    - name: Authenticate Ngrok
      run: .\ngrok\ngrok.exe authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

    - name: Create User & Enable RDP
      run: |
        net user remoteuser P@ssword1234! /add
        net localgroup administrators remoteuser /add
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

    - name: Start Ngrok & Show Address
      run: |
        # ログファイルに出力しながら起動
        Start-Process .\ngrok\ngrok.exe -ArgumentList "tcp --log=stdout 3389" -RedirectStandardOutput "ngrok.log"
        
        Write-Host "Waiting for ngrok address..."
        $address = ""
        while (-not $address) {
            if (Test-Path "ngrok.log") {
                $log = Get-Content "ngrok.log"
                $line = $log | Select-String -Pattern "url=tcp://[^ ]+"
                if ($line) {
                    $address = $line.Matches.Value.Substring(4) # 'url='を除去
                }
            }
            Start-Sleep -Seconds 2
        }
        
        Write-Host "------------------------------------------"
        Write-Host "RDP Address: $address"
        Write-Host "User: remoteuser"
        Write-Host "Pass: P@ssword1234!"
        Write-Host "------------------------------------------"

    - name: Keep Alive
      run: |
        Start-Sleep -Seconds 21600
