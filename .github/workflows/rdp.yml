name: Windows-Browser-Final

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Download DWService Agent
      run: |
        # エージェントのダウンロード
        Invoke-WebRequest https://www.dwservice.net/download/dwagent_x86.exe -OutFile dwagent.exe

    - name: Install & Connect
      run: |
        # インストールと接続の実行
        # 先ほどのキー「728-983-580」を直接指定します
        .\dwagent.exe -install -key 728-983-580
      continue-on-error: true

    - name: Keep Alive
      run: |
        # 6時間セッションを維持
        Start-Sleep -Seconds 21600
